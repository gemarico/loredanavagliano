<head>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cactus+Classical+Serif&display=swap');

  body {
  margin: 0;
    font-family: 'Cactus Classical Serif', serif;

}

/* Overlay (no bloquea interacción) */
#cookie-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 9998;
  pointer-events: none;
  
}

/* Banner simple móvil */
#cookie-banner {
  position: fixed;
  
  bottom: 40%;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  background: #f1e3c8;
  border-radius: 16px;
  padding: 16px;

  z-index: 9999;
  font-family: 'Cactus Classical Serif', serif;
  color: #393D32;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}

/* Texto */
#cookie-banner h2 {
  font-size: 14px;
  margin: 0 0 8px;
  font-weight: normal;
     font-family: 'Cactus Classical Serif', serif;
}

#cookie-banner p {
  font-size: 12px;
  margin-bottom: 12px;
     font-family: 'Cactus Classical Serif', serif;
}

/* Link */
#cookie-banner a {
  display: block;
  margin-bottom: 12px;
  text-decoration: underline;
  color: #393D32;
   font-size: 12px;
     font-family: 'Cactus Classical Serif', serif;
}

/* Botones */
.cookie-buttons {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
     font-family: 'Cactus Classical Serif', serif;
}

.cookie-btn {
  padding: 8px 14px;
  font-size: 12px;
  border-radius: 8px;
  cursor: pointer;
     font-family: 'Cactus Classical Serif', serif;
}

/* Decline */
.decline {
  background: transparent;
  border: 1px solid #393D32;
  color: #393D32;
}

/* Accept */
.accept {
  background: #393D32;
  color: #f1e3c8;
  border: none;
}

/* Cerrar */
.close-btn {
  position: absolute;
  top: 6px;
  right: 10px;
  background: none;
  border: none;
  font-size: 14px;
  color: #393D32;
}
</style>

</head>
